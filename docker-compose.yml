version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: whatsapp_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-whatsapp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-whatsapp_password}
      POSTGRES_DB: ${DB_NAME:-whatsapp_api}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsapp_user -d whatsapp_api"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: whatsapp_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://${DB_USER:-whatsapp_user}:${DB_PASSWORD:-whatsapp_password}@db:5432/${DB_NAME:-whatsapp_api}
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
